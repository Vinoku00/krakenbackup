[stepper_x]   # LDO-42STH48-2004AC en TMC2209 (1.6Ω 3.0mH) S1
step_pin: PC14
dir_pin: !PC13   #!PB4
enable_pin: !PE6
########homing_positive_dir: false  ##añadido
microsteps: 32 #32 #64
rotation_distance: 40.1  #40 #31   #40
endstop_pin: tmc5160_stepper_x:virtual_endstop
position_endstop: -2
position_min: -3
position_max: 323
homing_speed: 20
full_steps_per_rotation: 200
homing_retract_dist: 2 # Ajustado para intentar resolver el problema homing_speed: 20 full_steps_per_rotation: 200
homing_positive_dir: false #true  #false

[tmc5160 stepper_x]
cs_pin: PD6
spi_software_sclk_pin: PC6
spi_software_mosi_pin: PC8
spi_software_miso_pin: PC7
diag1_pin: ^!PF5       #^!PF5   # PF5   #^PF5
run_current: 1   #1.1  #0.800
hold_current: 0.2 
sense_resistor: 0.05   #0.022
stealthchop_threshold: 0

#spi_bus: spi1a

interpolate: False
driver_SGT: -20  #0

#LDO-42STH48-2004AC A 24 V
driver_TBL: 2      #3 48V
driver_TOFF: 5    #6
driver_HSTRT: 2    #4
driver_HEND: 1     #2


